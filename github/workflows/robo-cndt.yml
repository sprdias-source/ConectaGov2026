name: Robô CNDT

on:
  repository_dispatch:
    types: [robo-cndt]

jobs:
  buscar-cndt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências e navegador
        run: |
          npm install playwright @supabase/supabase-js
          npx playwright install --with-deps chromium

      - name: Rodar robô CNDT
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CLIENT_ID: ${{ github.event.client_payload.clientId }}
          CNPJ: ${{ github.event.client_payload.cnpj }}
          USER_ID: ${{ github.event.client_payload.userId }}
        run: node scripts/robos/buscar-cndt.js
